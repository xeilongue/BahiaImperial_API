<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                <form class="bg-white p-4 p-md-5 rounded-4 shadow-lg d-flex flex-column">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Cadastro</h2>
                    </div>

                    <div class="mb-3">
                        <label for="InputEmailRegister" class="form-label fw-semibold">Usuário</label>
                        <input class="form-control" id="InputEmailRegister" placeholder="CPF ou CNPJ">
                        <div id="emailHelp" class="form-text mt-2">Cpf (Pessoa física) / Cnpj (Pessoa Jurídica).</div>
                    </div>

                    <div class="mb-3">
                        <label for="InputPasswordRegister2" class="form-label fw-semibold">Senha</label>
                        <input type="password" class="form-control" id="InputPasswordRegister" placeholder="Crie uma senha">
                    </div>

                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" role="switch" id="showPassword"
                               onchange="
                                        const passwordInput = document.getElementById('InputPasswordRegister');
                                        passwordInput.type = (this.checked) ? 'text' : 'password';">
                        <label class="form-check-label small text-muted" for="showPassword" style="cursor: pointer;">Mostrar senha</label>
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button onclick="RegisterUser(event)" type="submit" class="btn btn-primary btn-lg shadow-sm">Registrar</button>
                    </div>

                    <div class="text-center">
                        <p class="mb-0 small">
                            Já possui uma conta?
                            <a href="index.html" class="link-danger text-decoration-none fw-bold">Login</a>
                        </p>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
