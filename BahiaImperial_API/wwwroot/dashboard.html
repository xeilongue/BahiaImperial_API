<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex vw-100 vh-100 container-sm bg-success align-items-center">

    <div class="d-flex container-sm flex-column justify-content-center align-items-center">

        <h1 class="mb-4">Controle de Usuários</h1>

        <div class="card p-4 mb-4 bg-light">

            <h4>Controle de Usuários</h4>

            <div class="mb-3">
                <label>Token JWT:</label>
                <input type="text" id="inputToken" class="form-control" placeholder="eyJhbGciOi...">
            </div>

            <button class="btn btn-success" onclick="RegisterUser()">Cadastrar Livro</button>

        </div>

        <button class="btn btn-primary mb-3" onclick="LoadUsers()">Atualizar Lista de Usuários</button>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Cpf_Cnpj</th>
                    <th>Password</th>
                </tr>
            </thead>
            <tbody id="tablebody">
            </tbody>

        </table>

    </div>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
