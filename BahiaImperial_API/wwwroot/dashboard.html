<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="vw-100 vh-100 container-sm d-flex bg-success">

    <div class="w-50 h-50 container-sm d-flex justify-content-center align-self-center">

        <h1 class="mb-4">Painel da Biblioteca</h1>

        <div class="card p-4 mb-4 bg-light">

            <h4>Cadastrar Novo Usuário</h4>

            <div class="mb-3">
                <label>Token JWT:</label>
                <input type="text" id="inputToken" class="form-control" placeholder="eyJhbGciOi...">
            </div>

            <button class="btn btn-success" onclick="RegisterUser()">Cadastrar Livro</button>

        </div>

        <button class="btn btn-primary mb-3" onclick="LoadUsers()">Atualizar Lista de Usuários</button>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Cpf_Cnpj</th>
                    <th>Password</th>
                </tr>
            </thead>
            <tbody id="tablebody">
            </tbody>

        </table>

    </div>
